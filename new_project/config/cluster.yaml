cluster_name: cka-lab

box:
  name: bento/ubuntu-22.04
  version: ">= 0"

provider:
  name: virtualbox

network:
  bridge_interface: "Intel(R) Ethernet Connection (2) I219-V"
  host_only_base: "192.168.99"

kubernetes:
  version: "1.34"
  pod_cidr: "10.244.0.0/16"
  service_cidr: "10.96.0.0/12"

addons:
  calico:
    version: "3.30.2"

nodes:
  control_planes:
    - name: cp-1
      cpus: 2
      memory_mb: 4096

  workers:
    - name: wk-1
      cpus: 2
      memory_mb: 3072
    - name: wk-2
      cpus: 2
      memory_mb: 3072
    - name: wk-3
      cpus: 2
      memory_mb: 3072

manager:
  cpus: 1
  memory_mb: 1024
  port: 8080
